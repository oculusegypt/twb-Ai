kind = "mobile"
previewPath = "/mobile/"
title = "دليل التوبة - موبايل"
version = "1.0.0"
id = "artifacts/tawbah-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24800

[services.development]
run = "pnpm --filter @workspace/tawbah-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tawbah-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tawbah-mobile", "run", "serve" ]

[services.env]
PORT = "24800"
BASE_PATH = "/mobile/"
